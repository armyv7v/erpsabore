<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recuperar Contraseña - ERP SaaS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white dark:bg-slate-900 shadow-xl rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header / Navigation -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-100 dark:border-slate-800">
<a class="text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-full transition-colors" href="#">
<span class="material-symbols-outlined block">arrow_back</span>
</a>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight ml-2">Volver al inicio</h2>
</div>
<div class="p-8">
<!-- Title Section -->
<div class="mb-8">
<div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl">lock_reset</span>
</div>
<h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight mb-3">¿Olvidaste tu contraseña?</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                    No te preocupes. Introduce el correo electrónico asociado a tu cuenta de ERP SaaS y te enviaremos las instrucciones para restablecerla.
                </p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<div>
<label class="block mb-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Correo electrónico</span>
<div class="relative mt-1">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
</div>
<input class="form-input block w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400" placeholder="ejemplo@empresa.com" required="" type="email"/>
</div>
</label>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white py-4 px-6 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2" type="submit">
<span>Enviar Instrucciones</span>
<span class="material-symbols-outlined">send</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-10 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                    ¿Recordaste tu contraseña? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Inicia sesión aquí</a>
</p>
</div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-50">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
