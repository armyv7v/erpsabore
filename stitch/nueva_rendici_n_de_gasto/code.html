<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-4 py-4 flex items-center gap-4">
<button class="flex items-center justify-center p-1 rounded-lg hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Nueva Rendición</h1>
</header>
<main class="flex-1 overflow-y-auto px-4 py-6 max-w-md mx-auto w-full">
<form class="space-y-6">
<!-- Category Select -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
                    Categoría
                </label>
<div class="relative">
<select class="form-select w-full appearance-none rounded-xl border border-primary/20 bg-white dark:bg-slate-800/50 px-4 py-3.5 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all">
<option disabled="" selected="" value="">Seleccionar categoría</option>
<option value="transporte">Transporte / Taxis</option>
<option value="alimentacion">Alimentación / Cenas</option>
<option value="alojamiento">Alojamiento</option>
<option value="otros">Otros Gastos</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                        expand_more
                    </span>
</div>
</div>
<!-- Amount (CLP) -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
                    Monto (CLP)
                </label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-medium text-slate-400">$</span>
<input class="form-input w-full rounded-xl border border-primary/20 bg-white dark:bg-slate-800/50 pl-8 pr-4 py-3.5 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="0" type="number"/>
</div>
</div>
<!-- Date Picker -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
                    Fecha del Gasto
                </label>
<div class="relative">
<input class="form-input w-full rounded-xl border border-primary/20 bg-white dark:bg-slate-800/50 px-4 py-3.5 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" type="date"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                        calendar_today
                    </span>
</div>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
                    Descripción
                </label>
<textarea class="form-textarea w-full rounded-xl border border-primary/20 bg-white dark:bg-slate-800/50 px-4 py-3.5 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all resize-none" placeholder="Ej. Almuerzo con cliente corporativo" rows="3"></textarea>
</div>
<!-- Upload Receipt -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
                    Comprobante
                </label>
<div class="flex flex-col items-center justify-center border-2 border-dashed border-primary/30 rounded-xl p-8 bg-primary/5 hover:bg-primary/10 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-4xl text-primary mb-2 group-hover:scale-110 transition-transform">cloud_upload</span>
<span class="text-sm font-medium text-primary">Subir Comprobante</span>
<span class="text-xs text-slate-500 mt-1">PDF, JPG o PNG (máx. 5MB)</span>
<input class="hidden" type="file"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">send</span>
                    Enviar Rendición
                </button>
<button class="w-full bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold py-4 rounded-xl transition-all" type="button">
                    Cancelar
                </button>
</div>
</form>
<div class="h-24"></div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 border-t border-primary/10 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2 z-20">
<div class="flex justify-around items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Inicio</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="text-[10px] font-medium">Gastos</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-medium">Reportes</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Perfil</span>
</a>
</div>
</nav>
</body></html>
