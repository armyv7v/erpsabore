<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom slider styling to match primary color */
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #ec5b13;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl">
<!-- Header / TopAppBar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 px-2">Nueva Oportunidad</h2>
<div class="flex w-16 items-center justify-end">
<p class="text-primary text-base font-bold leading-normal tracking-[0.015em] shrink-0 cursor-pointer">Guardar</p>
</div>
</div>
<div class="flex flex-col gap-1 p-4">
<!-- Opportunity Name -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Nombre de la Oportunidad</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal" placeholder="ej. Implementación Fase 2" value=""/>
</label>
</div>
<!-- Related Client -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Cliente Relacionado</p>
<div class="relative">
<select class="form-select flex w-full min-w-0 flex-1 appearance-none rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 p-[15px] text-base font-normal leading-normal">
<option value="">Seleccionar cliente...</option>
<option value="1">Empresas Copec S.A.</option>
<option value="2">Banco de Chile</option>
<option value="3">LATAM Airlines</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">expand_more</span>
</div>
</label>
</div>
<!-- Expected Amount -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Monto Estimado (CLP)</p>
<div class="flex w-full flex-1 items-stretch">
<div class="flex border border-slate-300 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 items-center justify-center px-4 rounded-l-xl border-r-0">
<span class="text-slate-600 dark:text-slate-400 font-bold">$</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal" placeholder="0" type="number"/>
</div>
</label>
</div>
<!-- Two column layout for Stage and Close Date -->
<div class="grid grid-cols-1 gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Etapa del Pipeline</p>
<div class="relative">
<select class="form-select flex w-full min-w-0 flex-1 appearance-none rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 p-[15px] text-base font-normal">
<option value="1">Prospecto</option>
<option value="2">Calificado</option>
<option value="3">Propuesta</option>
<option value="4">Negociación</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">expand_more</span>
</div>
</label>
</div>
<!-- Probability of Closure -->
<div class="flex flex-col gap-2 py-3">
<div class="flex justify-between items-center">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal">Probabilidad de Cierre</p>
<span class="text-primary font-bold text-sm">50%</span>
</div>
<input class="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary" max="100" min="0" type="range" value="50"/>
</div>
<!-- Estimated Close Date -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Fecha Estimada de Cierre</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 p-[15px] text-base font-normal" type="date"/>
</div>
</label>
</div>
<!-- Priority -->
<div class="flex flex-col gap-2 py-3">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Prioridad</p>
<div class="flex gap-2">
<button class="flex-1 py-3 px-4 rounded-xl border border-slate-300 dark:border-slate-700 text-sm font-medium bg-white dark:bg-slate-900 hover:bg-slate-50">Baja</button>
<button class="flex-1 py-3 px-4 rounded-xl border-2 border-primary text-primary bg-primary/10 text-sm font-bold">Media</button>
<button class="flex-1 py-3 px-4 rounded-xl border border-slate-300 dark:border-slate-700 text-sm font-medium bg-white dark:bg-slate-900 hover:bg-slate-50">Alta</button>
</div>
</div>
<!-- Description/Notes -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Descripción / Notas</p>
<textarea class="form-textarea flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-32 placeholder:text-slate-400 p-[15px] text-base font-normal resize-none" placeholder="Agregar detalles adicionales sobre la oportunidad..."></textarea>
</label>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 py-6">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-colors">
                    Crear Oportunidad
                </button>
<button class="w-full bg-transparent text-slate-500 dark:text-slate-400 font-medium py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Cancelar
                </button>
</div>
</div>
<!-- Bottom Spacer for mobile safety area -->
<div class="h-8 bg-white dark:bg-background-dark"></div>
</div>
</body></html>
