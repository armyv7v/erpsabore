<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">

<button class="flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">save</span>
</button>

<!-- Role Selection -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-4">Seleccionar Rol</h3>

<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary text-white px-5 shadow-lg shadow-primary/20 transition-all">

</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 px-5 transition-all">
<span class="text-sm font-semibold">Inventario</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 px-4 transition-all text-slate-400">

</button>

<div class="relative inline-flex items-center cursor-pointer">

<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">

<span class="font-medium text-slate-900 dark:text-slate-100">Editar Ventas</span>

</div>
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</div>
</label>
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">

<span class="font-medium text-slate-900 dark:text-slate-100 text-red-600 dark:text-red-400">Anular Ventas</span>
<span class="text-xs text-slate-500 dark:text-slate-400">Acción crítica: Cancelar transacciones</span>

<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>

<span class="text-xs text-slate-500 dark:text-slate-400">Entradas, salidas y ajustes manuales</span>
