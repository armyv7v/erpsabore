<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-icon { font-variation-settings: 'FILL' 1; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Navigation -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-4">
<div class="max-w-3xl mx-auto flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined align-middle">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Configuración de Empresa</h1>
</div>
<button class="bg-primary text-white px-5 py-2 rounded-lg font-semibold text-sm hover:bg-primary/90 transition-all shadow-sm">
                Guardar Cambios
            </button>
</div>
</header>
<main class="flex-1 max-w-3xl mx-auto w-full p-4 pb-32 space-y-8">
<!-- Logo Section -->
<section class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<h2 class="text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">image</span>
                Identidad Visual
            </h2>
<div class="flex items-center gap-6">
<div class="relative group">
<div class="w-24 h-24 rounded-xl bg-slate-100 dark:bg-slate-800 border-2 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Logo corporativo moderno y minimalista" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYdo7qQs3XvHQJNGl9ynGwZyBjRscBUbCfBcmsN4eh1q2uVYg43B0ljAMKHFX6GRSaJkumVMyeGIz1zRwJR59FonuUn-zh7O-zQsml77YNY4VBy_dG1yPhmWe7zxOAWLUQKzPi9PIMRUylKH3zBQ_ySsh7EUW9p3ndsInqYHMIcVMcE8ayI1TNaqmP6Vr2pD2d4hE0OiBKFpG2Pk-lZAlq3sWTWEgb3mvoWqF0JPAhpmzNwDuzI4cgY8X7D6jRjBGyUDmXEOMDQTg"/>
</div>
<button class="absolute -bottom-2 -right-2 bg-primary text-white p-1.5 rounded-full shadow-lg border-2 border-white dark:border-slate-900">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<div class="flex-1">
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Logotipo de la Empresa</p>
<p class="text-xs text-slate-500 mt-1">PNG o JPG. Máximo 2MB. Recomendado 400x400px.</p>
<div class="mt-3 flex gap-2">
<button class="text-xs font-semibold text-primary border border-primary/20 bg-primary/10 px-3 py-1.5 rounded-lg hover:bg-primary/20 transition-colors">Subir nuevo</button>
<button class="text-xs font-semibold text-slate-500 hover:text-red-500 px-3 py-1.5 transition-colors">Eliminar</button>
</div>
</div>
</div>
</section>
<!-- General Info Section -->
<section class="space-y-4">
<h2 class="text-lg font-bold px-1 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">business</span>
                Información General
            </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-600 dark:text-slate-400 ml-1">Razón Social</label>
<input class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" type="text" value="Tecnologías Innova SpA"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-600 dark:text-slate-400 ml-1">RUT</label>
<input class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="12.345.678-9" type="text" value="76.123.456-K"/>
</div>
<div class="md:col-span-2 space-y-1.5">
<label class="text-sm font-semibold text-slate-600 dark:text-slate-400 ml-1">Giro Comercial (SII)</label>
<textarea class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" rows="2">Servicios de consultoría informática y desarrollo de software a medida.</textarea>
</div>
</div>
</section>
<!-- Contact & Locations Section -->
<section class="space-y-4">
<h2 class="text-lg font-bold px-1 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">location_on</span>
                Sucursales y Contacto
            </h2>
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden">
<div class="p-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
<div>
<p class="font-bold">Casa Matriz</p>
<p class="text-sm text-slate-500">Santiago, Chile</p>
</div>
<span class="bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded">Principal</span>
</div>
<div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Dirección</label>
<input class="w-full text-sm bg-slate-50 dark:bg-slate-800/50 border-none rounded-lg px-3 py-2" type="text" value="Av. Apoquindo 4501, Of. 902"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Comuna</label>
<input class="w-full text-sm bg-slate-50 dark:bg-slate-800/50 border-none rounded-lg px-3 py-2" type="text" value="Las Condes"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Email Corporativo</label>
<input class="w-full text-sm bg-slate-50 dark:bg-slate-800/50 border-none rounded-lg px-3 py-2" type="email" value="contacto@innova.cl"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Teléfono</label>
<input class="w-full text-sm bg-slate-50 dark:bg-slate-800/50 border-none rounded-lg px-3 py-2" type="tel" value="+56 2 2345 6789"/>
</div>
</div>
<div class="bg-slate-50 dark:bg-slate-800/30 p-3 flex justify-center">
<button class="text-primary text-xs font-bold flex items-center gap-1 hover:underline">
<span class="material-symbols-outlined text-sm">add_circle</span>
                        Añadir Sucursal
                    </button>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 pb-safe">
<div class="flex max-w-3xl mx-auto items-center justify-around px-4 pt-3 pb-6">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Inicio</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Ventas</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Reportes</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined active-icon">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Ajustes</span>
</a>
</div>
</nav>
</body></html>
